<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Relvaload abstract logo option 07</title>
  <desc id="desc">A soft abstract circular logo inspired by Estonian flag colors.</desc>
